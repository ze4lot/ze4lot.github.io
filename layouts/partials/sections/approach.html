{{ $sectionID := replace (lower .section.name) " " "-" }}
{{ if .section.id }}
{{ $sectionID = .section.id }}
{{ end }}

<div class="container-fluid anchor pb-5" id="{{ $sectionID }}">
  {{ if not (.section.hideTitle) }}
  <h1 class="text-center"><span id="{{ $sectionID }}"></span>{{ .section.name }}</h1>
  {{ else }}
  <h1 class="text-center" style="display: none"><span id="{{ $sectionID }}"></span>{{ .section.name }}</h1>
  {{ end }}

  <div class="container">
    <div class="row">
      {{ range .items }}
      <div class="col-xs-12 col-sm-6 col-lg-4 pt-2">
        <div class="card h-100">
          <div class="card-head">
            <h5 class="card-title p-3 pb-0">{{ .title }}</h5>
          </div>
          <div class="card-body text-justify pt-1">
            <div class="card-text">{{ .description | markdownify }}</div>
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</div>
