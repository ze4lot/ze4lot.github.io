background:
  color: "#111827"

skills:
- name: Legacy Modernization
  icon: "fas fa-layer-group"
  summary: >
    I turn difficult legacy systems into clearer and more maintainable platforms, reducing hidden complexity without breaking what already works.

- name: Integration Architecture
  icon: "fas fa-diagram-project"
  summary: >
    I design reliable integration flows between internal services and external systems, with strong attention to data consistency, boundaries, and long-term stability.

- name: Domain Clarity
  icon: "fas fa-sitemap"
  summary: >
    I translate messy business rules into explicit domain structures, helping teams understand what the system actually does and where responsibilities belong.

- name: Technical Leadership
  icon: "fas fa-gears"
  summary: >
    I support engineering decisions with architectural thinking, helping teams move faster without losing structure, maintainability, or delivery focus.

- name: Business-to-Technology Translation
  icon: "fas fa-compass"
  summary: >
    I work between stakeholders and engineering, turning product and domain needs into technical direction that is realistic, scalable, and easier to execute.

- name: AI-accelerated Engineering
  icon: "fas fa-microchip"
  summary: >
    I use AI to speed up analysis, refactoring, documentation, and technical exploration - as leverage for better delivery, not as a shortcut for weak decisions.
