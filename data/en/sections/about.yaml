# a summary about you
summary: >
  I design and evolve complex business systems with a strong focus on structure, clarity, and long-term maintainability.

  I work with systems that involve multiple integrations, data flows, and domain dependencies, making sure they remain consistent and understandable as they grow.

  I translate business needs into domain models, system architecture, and integration strategies that are realistic to implement and stable in production.

  My focus is on pragmatic solutions - reducing unnecessary complexity, improving predictability, and creating systems that teams can confidently build on.

